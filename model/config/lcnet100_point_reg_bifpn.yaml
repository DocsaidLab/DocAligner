common:
  batch_size: 64
  image_size: [256, 256]
  is_restore: True
  restore_ind: "2023-12-14-06-40-24"
  restore_ckpt: "epoch=40-step=102500.ckpt"
  preview_batch: 10000

trainer:
  max_epochs: 50
  precision: 32
  val_check_interval: 1.0
  gradient_clip_val: 5
  accumulate_grad_batches: 1
  accelerator: gpu
  devices: [0]

model:
  name: DocAlignedModel
  backbone:
    name: Backbone
    options:
      name: lcnet_100
      pretrained: True
      features_only: True
      replace_components: True
  neck:
    name: bifpns
    out_channels: 64
    n_bifpn: 3
  head:
    name: PointRegHead
    options:
      in_c: 64
      n_points: 8

onnx:
  name: WarpLC100FPN
  input_shape:
    img:
      shape: [1, 3, 256, 256]
      dtype: float32
  input_names: ['img']
  output_names: ['output']
  dynamic_axes:
    img:
      '0': batch_size
    output:
      '0': batch_size
  options:
    opset_version: 16
    verbose: False
    do_constant_folding: True

quantize:
  do_quant: True
  device: mobile
  options:
    quant_format: QOperator
    per_channel: True
    reduce_range: True
    optimize_model: True
    nodes_to_exclude: ["/Split", "/act/Sigmoid"]

dataset:
  train_options:
    name: DocAlignedDataset
    options:
      root: /data/Dataset
      image_size: [256, 256]
      aug_ratio: 1
      fuse_dataset:
        - midv500
        - midv2019
        - midv2020
        - cord
        - sync
        - smartdoc
      fuse_ratio: [0.1, 0.1, 0.1, 0.05, 0.55, 0.1]
      length_of_dataset: 160000
  valid_options:
    name: SmartDocDataset
    options:
      root: /data/Dataset
      mode: val
      image_size: [256, 256]
      return_tensor: True

dataloader:
  train_options:
    batch_size: -1
    num_workers: 32
    shuffle: False
    drop_last: False
  valid_options:
    batch_size: -1
    num_workers: 32
    shuffle: False
    drop_last: False

optimizer:
  name: AdamW
  options:
    lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 0.1
    amsgrad: False

lr_scheduler:
  name: PolynomialLRWarmup
  options:
    warmup_iters: 12500
    total_iters: 125000
  pl_options:
    monitor: loss
    interval: step

callbacks:
  - name: ModelCheckpoint
    options:
      monitor: val_iou
      mode: max
      verbose: True
      save_last: True
      save_top_k: 5
  - name: LearningRateMonitor
    options:
      logging_interval: step
  - name: RichModelSummary
    options:
      max_depth: 3
  - name: CustomTQDMProgressBar
    options:
      unit_scale: -1

logger:
  name: TensorBoardLogger
  options:
    save_dir: logger
