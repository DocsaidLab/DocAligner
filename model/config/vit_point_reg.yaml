common:
  batch_size: 64
  image_size: [256, 256]
  is_restore: False
  restore_ind: ""
  restore_ckpt: ""
  preview_batch: 10000

trainer:
  max_epochs: 30
  precision: 32
  val_check_interval: 1.0
  gradient_clip_val: 5
  accumulate_grad_batches: 1
  accelerator: gpu
  devices: [0]

model:
  name: DocAlignedModel
  backbone:
    name: ViT
    options:
      nhead: 4
      d_model: 64
      num_layers: 36
      patch_size: 16
  head:
    name: ViTPointRegHead
    options:
      in_channels: 64
      num_points: 8

dataset:
  train_options:
    name: DocAlignedDataset
    options:
      root: /data/Dataset
      image_size: [256, 256]
      aug_ratio: 1
      fuse_dataset:
        - midv500
        - midv2019
        - midv2020
        - cord
        - sync
      fuse_ratio: [0.2, 0.2, 0.2, 0.05, 0.35]
      length_of_dataset: 160000
  valid_options:
    name: SmartDocDataset
    options:
      root: /data/Dataset
      image_size: [256, 256]
      return_tensor: True

dataloader:
  train_options:
    batch_size: -1
    num_workers: 32
    shuffle: False
    drop_last: False
  valid_options:
    batch_size: -1
    num_workers: 32
    shuffle: False
    drop_last: False


optimizer:
  name: AdamW
  options:
    lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 0.1
    amsgrad: False

lr_scheduler:
  name: MultiStepLRWarmUp
  options:
    warmup_milestone: 1000
    milestones: [100000, 200000]
    gamma: 0.316227766
  pl_options:
    monitor: loss
    interval: step

callbacks:
  - name: ModelCheckpoint
    options:
      monitor: val_iou
      mode: max
      verbose: True
      save_last: True
      save_top_k: 5
  - name: LearningRateMonitor
    options:
      logging_interval: step
  - name: RichModelSummary
    options:
      max_depth: 3
  - name: CustomTQDMProgressBar
    options:
      unit_scale: -1

logger:
  name: TensorBoardLogger
  options:
    save_dir: logger
